<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novara Labs | Premium Research Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fff;
            color: #1a1a1a;
            margin: 0;
            overflow-x: hidden;
        }

        /* Wavy pattern for the section */
        .bg-wavy {
            background-color: #fcfcfc;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='20' viewBox='0 0 100 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M21.184 20c.357-.13.72-.264 1.088-.402l1.768-.661C33.64 15.347 39.647 13 50 13s16.36 2.347 25.96 5.937l1.768.661c.368.138.73.272 1.088.402H100V0H0v20h21.184z' fill='%23f97316' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        /* Diagonal split background - Refined for Precision Tech Look */
        .hero-split {
            position: relative;
            background: radial-gradient(circle at 75% 25%, #1a1a1a 0%, #111 60%);
            /* Dark secondary with depth */
        }

        .hero-split::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            /* Tech-cut clip path */
            clip-path: polygon(0 0, 100% 0, 100% 82%, 95% 82%, 92% 85%, 0 85%);
            z-index: 0;
        }

        /* Glowing Tech Line */
        .hero-split::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f97316;
            opacity: 0.3;
            /* Offset slightly below the white section */
            clip-path: polygon(0 85%, 92% 85%, 95% 82%, 100% 82%, 100% 82.5%, 95% 82.5%, 92% 85.5%, 0 85.5%);
            z-index: 1;
            filter: blur(2px);
        }

        /* Sub-layer for the wavy pattern to keep it within the white area */
        .hero-split-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='20' viewBox='0 0 100 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M21.184 20c.357-.13.72-.264 1.088-.402l1.768-.661C33.64 15.347 39.647 13 50 13s16.36 2.347 25.96 5.937l1.768.661c.368.138.73.272 1.088.402H100V0H0v20h21.184z' fill='%23f97316' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            clip-path: polygon(0 0, 100% 0, 100% 82%, 95% 82%, 92% 85%, 0 85%);
            z-index: 1;
            pointer-events: none;
        }

        .rounded-pill {
            border-radius: 9999px;
        }
    </style>
